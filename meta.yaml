# semver-dredd metadata / feature manifest
# This file is meant to be checked into repos that use semver-dredd.
# The CLI can read it (optionally) to apply policies and defaults.

schema_version: 1

tool:
  name: semver-dredd
  # Mirror of pyproject.toml's version (nice-to-have; not required at runtime)
  version: "0.1.0"

features:
  api_introspection:
    implemented: true
    notes: "Extracts public functions/classes/method signatures from Python modules."
  change_detection:
    implemented: true
    types:
      - major
      - minor
      - patch
      - none
  version_management:
    implemented: true
    patch_format: "YYYYMMDDZZZ"
  cli:
    commands:
      - compare
      - bump
      - patch

policies:
  # If false, a detected ChangeType.MAJOR will cause `compare` to fail (non-zero exit).
  allow_breaking_changes: false

output:
  # Default severity mapping used by the CLI; can be overridden by flags.
  severity_by_change:
    none: info
    patch: info
    minor: warn
    major: error

exit_codes:
  ok: 0
  error: 1
  breaking_changes_detected: 10
