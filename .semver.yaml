# semver-dredd metadata / feature manifest
# This file is meant to be checked into repos that use semver-dredd.
# The CLI can read it (optionally) to apply policies and defaults.

schema_version: 1

tool:
  name: semver-dredd
  # Mirror of pyproject.toml's version (nice-to-have; not required at runtime)
  version: "0.1.0"

features:
  api_introspection:
    implemented: true
    notes: "Extracts public functions/classes/method signatures from Python modules."
  change_detection:
    implemented: true
    types:
      - major
      - minor
      - patch
      - none
  version_management:
    implemented: true
    patch_format: "YYYYMMDDZZZ"
  cli:
    commands:
      - compare
      - bump
      - patch

policies:
  # If false, a detected ChangeType.MAJOR will cause `status`/`compare` to fail (exit 10).
  allow_breaking_changes: false

output:
  # Default severity mapping used by the CLI.
  severity_by_change:
    none: info     # Green - no changes
    patch: info    # Green - implementation only
    minor: warn    # Yellow - new features
    major: error   # Red - breaking changes (becomes warn with --allow-breaking)

exit_codes:
  ok: 0
  error: 1
  breaking_changes_detected: 10
