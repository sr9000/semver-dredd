name: publish-pypi

on:
  workflow_dispatch:
    inputs:
      publish_core:
        description: Publish the core semver-dredd package
        required: true
        default: true
        type: boolean
      publish_plugins:
        description: Publish the official plugin packages used by extras
        required: true
        default: true
        type: boolean
      publish_meta:
        description: Publish the semver-dredd-all meta-package after core + plugins
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-plugins:
    if: ${{ inputs.publish_plugins }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_name: python-3.10-dredd
            package_dir: plugins/python-3.10-dredd
          - package_name: go-1.20-dredd
            package_dir: plugins/go-1.20-dredd
          - package_name: java-1.8-dredd
            package_dir: plugins/java-1.8-dredd
          - package_name: javaparser-1.8-dredd
            package_dir: plugins/javaparser-1.8-dredd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build ${{ matrix.package_name }}
        run: |
          python -m pip install --upgrade pip build twine
          python -m build "${{ matrix.package_dir }}" --outdir dist
          python -m twine check dist/*

      - name: Publish ${{ matrix.package_name }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-core:
    if: ${{ inputs.publish_core }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build semver-dredd
        run: |
          python -m pip install --upgrade pip build twine
          python -m build . --outdir dist
          python -m twine check dist/*

      - name: Publish semver-dredd to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-meta:
    if: ${{ inputs.publish_meta && inputs.publish_core && inputs.publish_plugins }}
    needs:
      - publish-plugins
      - publish-core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build semver-dredd-all
        run: |
          python -m pip install --upgrade pip build twine
          python -m build plugins/semver-dredd-all --outdir dist
          python -m twine check dist/*

      - name: Publish semver-dredd-all to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist