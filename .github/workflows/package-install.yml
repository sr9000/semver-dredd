name: package-install

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: package-install-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build core and official plugin distributions
        run: |
          mkdir -p wheelhouse
          python -m build --outdir wheelhouse .
          for pkg in \
            plugins/python-3.10-dredd \
            plugins/go-1.20-dredd \
            plugins/java-1.8-dredd \
            plugins/javaparser-1.8-dredd \
            plugins/semver-dredd-all
          do
            python -m build --outdir wheelhouse "$pkg"
          done

      - name: Validate built distributions
        run: python -m twine check wheelhouse/*

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse
          path: wheelhouse/*

  install-matrix:
    needs: build-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tool-only
            install_spec: semver-dredd
            expected_plugins: bundle
          - name: tool-plus-python
            install_spec: semver-dredd[python]
            expected_plugins: bundle,python
          - name: tool-plus-go-java-javaparser
            install_spec: semver-dredd[go,java,javaparser]
            expected_plugins: bundle,go,java,javaparser
          - name: tool-plus-all
            install_spec: semver-dredd[all]
            expected_plugins: bundle,go,java,javaparser,python
    name: ${{ matrix.name }}
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: wheelhouse
          path: wheelhouse

      - name: Install pip tooling and runtime dependency seed
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyYAML

      - name: Install requested package set from local wheelhouse
        env:
          INSTALL_SPEC: ${{ matrix.install_spec }}
        run: python -m pip install --no-index --find-links wheelhouse "$INSTALL_SPEC"

      - name: Show discovered plugins
        run: semver-dredd plugin list --json | tee plugins.json

      - name: Assert only requested plugins plus builtin bundle are available
        env:
          EXPECTED_PLUGINS: ${{ matrix.expected_plugins }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          payload = json.loads(Path("plugins.json").read_text())
          actual = {item["name"] for item in payload}
          expected = {
              name.strip()
              for name in os.environ["EXPECTED_PLUGINS"].split(",")
              if name.strip()
          }

          if actual != expected:
              print(f"Expected plugins: {sorted(expected)}")
              print(f"Actual plugins:   {sorted(actual)}")
              sys.exit(1)

          origins = {item["name"]: item.get("origin", "") for item in payload}
          if origins.get("bundle") != "builtin":
              print(
                  "Expected bundle plugin to be builtin, got "
                  f"{origins.get('bundle')!r}"
              )
              sys.exit(1)

          unexpected_origins = {
              name: origin
              for name, origin in origins.items()
              if name != "bundle" and origin != "entry_point"
          }
          if unexpected_origins:
              print(
                  "Expected non-bundle plugins to come from entry points, got: "
                  f"{unexpected_origins}"
              )
              sys.exit(1)

          print("Plugin inventory matches requested extras exactly.")
          PY