name: package-install

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: package-install-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-install:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package-install test image
        run: docker build -f docker/Dockerfile.package-install -t semver-dredd-package-install .

      - name: Run package-install validation
        run: |
          docker run --rm \
            -v "$PWD":/work \
            -w /work \
            semver-dredd-package-install