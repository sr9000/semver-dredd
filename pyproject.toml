[project]
name = "semver-dredd"
version = "0.1.0"
description = "Automatically increments semver number based on interface changes."
authors = [
    {name = "sr9000",email = "no@mail.org"}
]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "PyYAML>=6.0",
]

[project.scripts]
semver-dredd = "cli:main"

# Built-in plugins (core distribution). These can later move to separate packages.
[project.entry-points."semver_dredd.plugins"]
python = "semverdredd.plugins.python:PythonPlugin"
go = "semverdredd.plugins.go:GoPlugin"
java = "semverdredd.plugins.java:JavaPlugin"


[tool.poetry.group.dev.dependencies]
pytest = "^8.0.0"
pydantic = "^2.0.0"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"


[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
